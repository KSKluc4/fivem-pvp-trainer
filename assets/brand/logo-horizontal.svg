<?xml version="1.0" encoding="UTF-8"?>
<!--
  FiveM PvP Trainer — horizontal lockup (icon + wordmark + tagline).
  Transparent background, for use in headers / OG image composition.
  Text uses the same font stack as the app (theme.js: 'Segoe UI', system-ui,
  -apple-system, sans-serif).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <g transform="translate(4,4)">
    <circle cx="28" cy="28" r="24" stroke="url(#g)" stroke-width="2.5"/>
    <circle cx="28" cy="28" r="10" stroke="url(#g)" stroke-width="2"/>
    <circle cx="28" cy="28" r="3" fill="url(#g)"/>
    <line x1="28" y1="2"  x2="28" y2="16" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="40" x2="28" y2="54" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2"  y1="28" x2="16" y2="28" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="28" x2="54" y2="28" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="76" y="34" font-family="'Segoe UI', Arial, sans-serif" font-size="23" font-weight="800" fill="#e8e8f0">FiveM PvP Trainer</text>
  <text x="76" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="#8a8aa0">TRAINING SYSTEM</text>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#7b2fd4"/>
    </linearGradient>
  </defs>
</svg>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redefinir senha / Reset password — FiveM PvP Trainer</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #10101c;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e8e8f0;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #16162a;
    border: 1px solid #33334d;
    border-radius: 12px;
    padding: 32px;
  }
  .brand {
    color: #00d4ff;
    font-weight: 800;
    font-size: 18px;
    margin: 0 0 24px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  .subtitle {
    color: #a0a0b8;
    font-size: 14px;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #c8c8d8;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border-radius: 6px;
    border: 1px solid #33334d;
    background: #10101c;
    color: #e8e8f0;
    font-size: 14px;
  }
  input:focus {
    outline: none;
    border-color: #00d4ff;
  }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #00d4ff;
    color: #080810;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .msg {
    margin-top: 16px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.4;
    display: none;
  }
  .msg.error {
    display: block;
    background: rgba(255, 71, 87, 0.12);
    color: #ff6b7a;
    border: 1px solid rgba(255, 71, 87, 0.3);
  }
  .msg.success {
    display: block;
    background: rgba(46, 213, 115, 0.12);
    color: #4ee08a;
    border: 1px solid rgba(46, 213, 115, 0.3);
  }
  a { color: #00d4ff; }
</style>
</head>
<body>
  <div class="card">
    <p class="brand">FiveM PvP Trainer</p>
    <h1 id="title">Redefinir senha</h1>
    <p class="subtitle" id="subtitle">Escolha uma nova senha para sua conta.</p>

    <form id="form">
      <label for="password" id="label-password">Nova senha</label>
      <input id="password" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••">

      <label for="confirm" id="label-confirm">Confirmar senha</label>
      <input id="confirm" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••">

      <button id="submit" type="submit">Redefinir senha</button>
    </form>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    // Same detection rule as the desktop app: navigator.language starting
    // with "pt" gets Portuguese, everything else gets English. This page has
    // no localStorage override (it's a one-off landing reached from an
    // email link, not a persistent session) — just a live per-visitor guess.
    const LANG = (navigator.language || '').toLowerCase().startsWith('pt') ? 'pt' : 'en';

    const STRINGS = {
      pt: {
        pageTitle:      'Redefinir senha — FiveM PvP Trainer',
        title:          'Redefinir senha',
        subtitle:       'Escolha uma nova senha para sua conta.',
        labelPassword:  'Nova senha',
        labelConfirm:   'Confirmar senha',
        submit:         'Redefinir senha',
        submitting:     'Redefinindo...',
        noToken:        'Link inválido — token de redefinição ausente.',
        mismatch:       'As senhas não coincidem.',
        tooShort:       'A senha deve ter pelo menos 6 caracteres.',
        genericError:   'Não foi possível redefinir a senha.',
        success:        'Senha redefinida com sucesso! Você já pode fazer login no app.',
        serverDown:     'Servidor indisponível. Tente novamente em instantes.',
      },
      en: {
        pageTitle:      'Reset password — FiveM PvP Trainer',
        title:          'Reset password',
        subtitle:       'Choose a new password for your account.',
        labelPassword:  'New password',
        labelConfirm:   'Confirm password',
        submit:         'Reset password',
        submitting:     'Resetting...',
        noToken:        'Invalid link — reset token missing.',
        mismatch:       "Passwords don't match.",
        tooShort:       'Password must be at least 6 characters.',
        genericError:   'Could not reset the password.',
        success:        'Password reset successfully! You can now log in on the app.',
        serverDown:     'Server unavailable. Try again shortly.',
      },
    };
    const S = STRINGS[LANG];

    document.documentElement.lang = LANG === 'pt' ? 'pt-BR' : 'en';
    document.title = S.pageTitle;
    document.getElementById('title').textContent          = S.title;
    document.getElementById('subtitle').textContent       = S.subtitle;
    document.getElementById('label-password').textContent = S.labelPassword;
    document.getElementById('label-confirm').textContent  = S.labelConfirm;
    document.getElementById('submit').textContent         = S.submit;

    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token') || '';

    const form    = document.getElementById('form');
    const msg     = document.getElementById('msg');
    const submit  = document.getElementById('submit');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
    }

    if (!token) {
      showMsg(S.noToken, 'error');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm   = document.getElementById('confirm').value;

      if (password !== confirm) {
        showMsg(S.mismatch, 'error');
        return;
      }
      if (password.length < 6) {
        showMsg(S.tooShort, 'error');
        return;
      }

      submit.disabled = true;
      submit.textContent = S.submitting;

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.error || S.genericError, 'error');
          submit.disabled = false;
          submit.textContent = S.submit;
          return;
        }

        showMsg(S.success, 'success');
        form.style.display = 'none';
      } catch (err) {
        showMsg(S.serverDown, 'error');
        submit.disabled = false;
        submit.textContent = S.submit;
      }
    });
  </script>
</body>
</html>
